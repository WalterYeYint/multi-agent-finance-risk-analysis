name: build-and-push

# Builds Dockerfile.backend and Dockerfile.worker in parallel and pushes both
# images to their ECR repos. Tagged with `:latest` and `:<commit-sha>`.
#
# Triggers:
#   - workflow_dispatch (manual button from the Actions tab)
#   - push to main when any file that affects the image actually changes
#
# Prerequisites (one-time):
#   - ECR repos exist: `finance-agents-backend` and `finance-agents-worker`
#     (created in AWS_DEPLOYMENT.md Step 2)
#   - IAM user behind AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY has at least the
#     AmazonEC2ContainerRegistryPowerUser managed policy attached.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'Dockerfile.backend'
      - 'Dockerfile.worker'
      - '.dockerignore'
      - 'requirements.txt'
      - 'backend/**'
      - 'src/**'
      - '.github/workflows/build-and-push.yml'

permissions:
  contents: read

concurrency:
  group: build-and-push-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-2
  ECR_REPO_PREFIX: finance-agents

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [backend, worker]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service }} image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.${{ matrix.service }}
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPO_PREFIX }}-${{ matrix.service }}:latest
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPO_PREFIX }}-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  smoke-test:
    name: smoke-test pulled images
    needs: build
    runs-on: ubuntu-latest

    # Real Postgres + pgvector. The backend and worker reach it at localhost:5432
    # via `docker run --network host` (Linux runners only).
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: finance
          POSTGRES_PASSWORD: finance
          POSTGRES_DB: finance_rag
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U finance"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://finance:finance@localhost:5432/finance_rag
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Pull freshly-pushed images
        run: |
          REG="${{ steps.ecr-login.outputs.registry }}"
          docker pull "$REG/${ECR_REPO_PREFIX}-backend:${IMAGE_TAG}"
          docker pull "$REG/${ECR_REPO_PREFIX}-worker:${IMAGE_TAG}"

      # --- Backend ---------------------------------------------------------
      - name: Start backend container
        run: |
          REG="${{ steps.ecr-login.outputs.registry }}"
          docker run -d --name backend --network host \
            -e DATABASE_URL="$DATABASE_URL" \
            -e MODEL_PROVIDER=ollama \
            -e PORT=8000 \
            "$REG/${ECR_REPO_PREFIX}-backend:${IMAGE_TAG}"

      - name: Wait for /api/health to return 200
        run: |
          for i in $(seq 1 20); do
            if curl -fsS http://localhost:8000/api/health; then
              echo; echo "✓ backend /api/health is up after $((i*3))s"
              exit 0
            fi
            echo "waiting for backend ($i/20)…"
            sleep 3
          done
          echo "✗ backend never became healthy in 60s"
          docker logs backend
          exit 1

      - name: Hit /api/tickers (exercises DB connection + ensure_schema)
        run: |
          BODY=$(curl -fsS -w '\n%{http_code}' http://localhost:8000/api/tickers)
          STATUS=$(echo "$BODY" | tail -n1)
          echo "status: $STATUS"
          echo "body  : $(echo "$BODY" | head -n1)"
          [ "$STATUS" = "200" ] || { echo "✗ /api/tickers returned $STATUS"; docker logs backend; exit 1; }
          echo "✓ /api/tickers returned 200"

      - name: Backend logs (always)
        if: always()
        run: docker logs backend || true

      - name: Tear down backend
        if: always()
        run: docker rm -f backend || true

      # --- Worker ----------------------------------------------------------
      - name: Start worker container
        run: |
          REG="${{ steps.ecr-login.outputs.registry }}"
          docker run -d --name worker --network host \
            -e DATABASE_URL="$DATABASE_URL" \
            -e MODEL_PROVIDER=ollama \
            -e WORKER_POLL_SECONDS=3 \
            -e WORKER_REFRESH_SCAN_SECONDS=300 \
            "$REG/${ECR_REPO_PREFIX}-worker:${IMAGE_TAG}"

      - name: Verify worker stays alive 20s (no crash on startup or first poll)
        run: |
          sleep 20
          RUNNING=$(docker inspect -f '{{.State.Running}}' worker || echo missing)
          if [ "$RUNNING" != "true" ]; then
            echo "✗ worker exited within 20s (state: $RUNNING)"
            docker logs worker
            exit 1
          fi
          echo "✓ worker is still running after 20s"

      - name: Worker logs (always)
        if: always()
        run: docker logs worker || true

      - name: Tear down worker
        if: always()
        run: docker rm -f worker || true

  deploy:
    name: deploy to AWS
    needs: smoke-test
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest

    env:
      ECS_CLUSTER: finance-agents
      ECS_SERVICE_WORKER: finance-agents-worker
      ECS_EXPRESS_SERVICE_NAME: finance-agents-backend
      # Bind these secrets to env so step-level `if:` conditions can read them.
      # `secrets.*` is not a valid context inside `if:`; `env.*` is.
      ECS_EXEC_ROLE_ARN: ${{ secrets.ECS_EXEC_ROLE_ARN }}
      ECS_INFRA_ROLE_ARN: ${{ secrets.ECS_INFRA_ROLE_ARN }}
      # Secrets Manager ARNs for the backend's runtime secrets (not the values —
      # ECS fetches the values at container start). See AWS_DEPLOYMENT.md Step 3.5.
      DATABASE_URL_SECRET_ARN: ${{ secrets.DATABASE_URL_SECRET_ARN }}
      OPENAI_KEY_SECRET_ARN: ${{ secrets.OPENAI_KEY_SECRET_ARN }}
      # POLYGON: backend needs it now that /api/price serves from Polygon aggregates.
      POLYGON_KEY_SECRET_ARN: ${{ secrets.POLYGON_KEY_SECRET_ARN }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      # Backend — ECS Express Mode. The official action wraps
      # create-express-gateway-service / update-express-gateway-service so the same
      # step works on first deploy (creates the service + ALB + URL) and on every
      # subsequent push (rolls a new revision). Idempotent.
      # environment-variables passes non-secret config inline; secrets passes
      # Secrets Manager ARNs as valueFrom (ECS resolves the values at start).
      # Both are passed on EVERY deploy so the service is fully configured whether
      # this run creates it or updates it — the action's update semantics for env
      # preservation are undocumented, so we re-assert rather than rely on them.
      - name: Deploy backend to ECS Express Mode
        if: env.ECS_EXEC_ROLE_ARN != '' && env.ECS_INFRA_ROLE_ARN != '' && env.DATABASE_URL_SECRET_ARN != '' && env.OPENAI_KEY_SECRET_ARN != '' && env.POLYGON_KEY_SECRET_ARN != ''
        uses: aws-actions/amazon-ecs-deploy-express-service@v1
        with:
          service-name: ${{ env.ECS_EXPRESS_SERVICE_NAME }}
          image: ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPO_PREFIX }}-backend:${{ github.sha }}
          execution-role-arn: ${{ env.ECS_EXEC_ROLE_ARN }}
          infrastructure-role-arn: ${{ env.ECS_INFRA_ROLE_ARN }}
          container-port: 8000
          environment-variables: '[{"name":"MODEL_PROVIDER","value":"openai"}]'
          secrets: '[{"name":"DATABASE_URL","valueFrom":"${{ env.DATABASE_URL_SECRET_ARN }}"},{"name":"OPENAI_API_KEY","valueFrom":"${{ env.OPENAI_KEY_SECRET_ARN }}"},{"name":"POLYGON_API_KEY","valueFrom":"${{ env.POLYGON_KEY_SECRET_ARN }}"}]'

      - name: Skip backend deploy (not fully configured)
        if: env.ECS_EXEC_ROLE_ARN == '' || env.ECS_INFRA_ROLE_ARN == '' || env.DATABASE_URL_SECRET_ARN == '' || env.OPENAI_KEY_SECRET_ARN == '' || env.POLYGON_KEY_SECRET_ARN == ''
        run: |
          echo "::warning::Backend deploy skipped — one or more required secrets are unset:"
          echo "  ECS_EXEC_ROLE_ARN, ECS_INFRA_ROLE_ARN (AWS_DEPLOYMENT.md Step 4a)"
          echo "  DATABASE_URL_SECRET_ARN, OPENAI_KEY_SECRET_ARN, POLYGON_KEY_SECRET_ARN (AWS_DEPLOYMENT.md Step 3.5)"
          echo "Add all five as repo secrets, then re-run."

      # Worker — Fargate doesn't auto-poll ECR. force-new-deployment makes the
      # service spawn a new task with the freshly-pushed :latest image, then
      # drain the old one.
      - name: Force ECS service redeploy (worker)
        run: |
          STATUS=$(aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE_WORKER" \
            --query 'services[0].status' --output text 2>/dev/null || echo missing)
          if [ "$STATUS" != "ACTIVE" ]; then
            echo "::warning::ECS service $ECS_CLUSTER/$ECS_SERVICE_WORKER not found or not ACTIVE (status: $STATUS) — skipping worker deploy."
            echo "Create the cluster + service first (AWS_DEPLOYMENT.md Step 5)."
            exit 0
          fi
          DEPLOY_ID=$(aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE_WORKER" \
            --force-new-deployment \
            --query 'service.deployments[0].id' --output text)
          echo "✓ ECS worker redeploy triggered. DeploymentId: $DEPLOY_ID"
